<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Leap Years — Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#FAFAF9; --surface:#FFFFFF; --border-normal:#E7E5E4; --border-ghost:#D6D3D1;
  --amber:#B45309; --text:#1C1917; --muted:#78716C; --light:#A8A29E;
  --radius:10px; --node-w:260px; --map-w:960px;
}
body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; font-size:14px; line-height:1.6; overflow-x:auto; }
.page-header { padding:56px 40px 32px; max-width:calc(var(--map-w) + 80px); margin:0 auto; border-bottom:1px solid var(--border-normal); }
.page-header h1 { font-size:24px; font-weight:600; }
.page-header p  { color:var(--muted); font-size:13px; margin-top:4px; }
#scroll-wrap { overflow-x:auto; padding:0 40px 120px; }
#map { position:relative; width:var(--map-w); margin:0 auto; }
#lines { position:absolute; top:0; left:0; width:100%; pointer-events:none; overflow:visible; }
.era-label { position:absolute; left:0; right:0; display:flex; align-items:baseline; gap:12px; transition:top 0.32s ease; }
.era-label h2 { font-size:18px; font-weight:600; letter-spacing:-0.3px; color:var(--amber); }
.era-label span { font-size:12px; color:var(--light); }
.node { position:absolute; width:var(--node-w); background:var(--surface); border:1.5px solid var(--border-normal); border-radius:var(--radius); cursor:pointer; transform:translateX(-50%); transition:border-color 0.2s,opacity 0.25s,filter 0.25s,box-shadow 0.2s,background 0.2s; overflow:hidden; }
.node:hover { border-color:var(--muted); }
.node-head { padding:12px 14px; user-select:none; position:relative; display:flex; gap:10px; align-items:flex-start; }
.node-avatar { width:36px; height:36px; border-radius:50%; overflow:hidden; flex-shrink:0; background:#F0EBE3; display:flex; align-items:center; justify-content:center; margin-top:1px; }
.node-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
.av-fallback { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:0.3px; }
.node-head-text { flex:1; min-width:0; padding-right:20px; }
.node-type { font-size:9.5px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--light); margin-bottom:3px; }
.node-title { font-size:15px; font-weight:500; line-height:1.3; color:var(--text); }
.node-date  { font-size:11px; color:var(--muted); margin-top:4px; }
.node-chevron { position:absolute; top:13px; right:13px; font-size:16px; color:var(--light); transition:transform 0.22s; line-height:1; }
.node.open .node-chevron { transform:rotate(180deg); }
.node-detail { max-height:0; overflow:hidden; transition:max-height 0.32s ease; }
.node.open .node-detail { max-height:600px; }
.node-detail-inner { border-top:1px solid #F0EDEA; padding:12px 14px 14px; font-size:12.5px; color:var(--muted); line-height:1.75; }
.node.is-ghost   { border-color:var(--border-ghost); background:#FAFAF9; }
.node.is-active  { border-color:var(--amber) !important; background:#FFFBEB; }
.node.is-selected{ border-color:var(--amber) !important; box-shadow:0 0 0 2px rgba(180,83,9,0.18); }
.node.is-dimmed  { opacity:0.18; filter:grayscale(70%); pointer-events:none; }
#toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(8px); background:#1C1917; color:#FFF; font-size:12px; padding:8px 18px; border-radius:20px; opacity:0; pointer-events:none; transition:opacity 0.2s,transform 0.2s; z-index:999; cursor:pointer; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
</style>

<body>
<div class="page-header">
  <h1>Great Leap Years — Timeline</h1>
  <p>Stephen Fry's history of technology · Season 1 · Click a node to trace its ancestry · Esc to reset</p>
</div>
<div id="scroll-wrap"><div id="map"><svg id="lines"></svg></div></div>
<div id="toast">Tap here to collapse all</div>
<script>
const COL={left:160,center:480,right:800};
const ERA_HEAD=48,SECTION_PAD=44,COLLAPSED_H=88,MIN_GAP=128;

const ERA_DEFS=[
  {key:'prehistory',name:'Prehistory',    span:'2,000,000 – 10,000 BCE',startYear:-2000000,endYear:-3500,budget:800},
  {key:'medieval',  name:'Medieval',      span:'500 – 1600 CE',          startYear:500,     endYear:1600, budget:600},
  {key:'industrial',name:'Industrial',    span:'1600 – 1930',            startYear:1600,    endYear:1930, budget:2800},
  {key:'computing', name:'Computing Era', span:'1910 – present',         startYear:1910,    endYear:2025, budget:1000},
];
const CHEVRON_AFTER_ERAS=new Set(['prehistory','medieval']);

const NODES={
  // PREHISTORY — EP1
  'first-tools':{col:'center',type:'invention',eraKey:'prehistory',dateNum:-2000000,date:'2,000,000 BCE',title:'First Tool-Making',
    avatar:{type:'emoji',emoji:'🪨'},
    body:'Our ancestors begin deliberately shaping stone — the earliest sign of a technological species. These weren\'t simply found objects; they were shaped to extend our natural capabilities. Oldowan tools in East Africa: a cognitive threshold crossed.'},
  'cognitive-revolution':{col:'center',type:'concept',eraKey:'prehistory',dateNum:-70000,date:'c. 70,000 BCE',title:'Cognitive Revolution',
    avatar:{type:'emoji',emoji:'💡'},
    body:'Language emerges — perhaps 60 or 70,000 years ago. For the first time, ideas, techniques and knowledge can be shared across generations. Fry draws on Yuval Noah Harari: this is the big bang of the human brain. Fiction becomes possible; so does culture, myth, and the first stories told around fires.'},
  'agricultural-revolution':{col:'center',type:'event',eraKey:'prehistory',dateNum:-10000,date:'c. 10,000 BCE',title:'Agricultural Revolution',
    avatar:{type:'emoji',emoji:'🌾'},
    body:'Around 10,000 years ago, in Mesopotamia between the Tigris and Euphrates, settled farming replaces nomadic foraging. Surplus calories fund specialisation, cities, bureaucracy, and a pressing need to record things. The conditions for technology as we know it are set.'},

  // MEDIEVAL — EP2
  'gutenberg':{col:'left',type:'person',eraKey:'medieval',dateNum:1398,date:'b. c. 1398',title:'Johannes Gutenberg',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Gutenberg_Kohler.jpg/120px-Gutenberg_Kohler.jpg',initials:'JG'},
    body:'German goldsmith who first tried to make a fortune selling pilgrim mirrors — small convex mirrors pilgrims held up to capture the radiance of holy relics. The scheme collapsed. His metallurgy skills led him to movable type. He raised €100,000-equivalent from a backer named Fust, who later sued him and took the press. Gutenberg died broke. He never saw the revolution he started.'},
  'gutenberg-press':{col:'center',type:'invention',eraKey:'medieval',dateNum:1450,date:'c. 1450',title:'Gutenberg\'s Printing Press',
    avatar:{type:'emoji',emoji:'⚙️'},
    body:'Gutenberg combines a wine-press, oil-based ink, and cast metal type in a lead-tin-antimony alloy. Output: 3,600 pages per day versus a scribe\'s two. The arrival of cheap spectacles made reading accessible to a mass audience for the first time. Within 50 years, 20 million books circulate across Europe.'},
  'martin-luther':{col:'left',type:'person',eraKey:'medieval',dateNum:1483,date:'b. 1483',title:'Martin Luther',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/Martin_Luther_by_Cranach-restoration.jpg/120px-Martin_Luther_by_Cranach-restoration.jpg',initials:'ML'},
    body:'Former Augustinian monk whose 95 Theses challenged the sale of indulgences in 1517. What made Luther\'s revolt stick where earlier reformers had failed? Gutenberg\'s press. Within two weeks his pamphlets spread across Germany; within months, all Europe. He understood the medium before anyone else did.'},
  'protestant-reformation':{col:'center',type:'event',eraKey:'medieval',dateNum:1517,date:'1517',title:'Protestant Reformation',
    avatar:{type:'emoji',emoji:'📌'},
    body:'From 180 printed books in the world in 1456 to millions by 1500. Luther\'s revolt, enabled by print, shatters Christendom\'s unity. Competing Bible translations drive literacy across Europe. The Reformation demonstrates that cheap information technology doesn\'t just change what people know; it changes who has power.'},

  // INDUSTRIAL — EP3–5
  'boole':{col:'right',type:'person',eraKey:'industrial',dateNum:1815,date:'b. 1815',title:'George Boole',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/George_Boole_color.jpg/120px-George_Boole_color.jpg',initials:'GB'},
    body:'Self-taught English mathematician who showed in "The Laws of Thought" (1854) that logical propositions could be expressed as equations using only 1s and 0s. His algebra sat largely unnoticed for 80 years — until Claude Shannon realised it was exactly the mathematics needed to design electrical circuits. Boole never saw the computer age he made possible.'},
  'volta':{col:'left',type:'person',eraKey:'industrial',dateNum:1745,date:'b. 1745',title:'Alessandro Volta',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Volta_A.jpg/120px-Volta_A.jpg',initials:'AV'},
    body:'Creates the voltaic pile (1800) — the first chemical battery, producing steady controllable current. Napoleon institutes the Volta Prize worth roughly €100,000 today to spur further electrical innovation. The unit of electrical potential, the volt, bears his name.'},
  'volta-battery':{col:'center',type:'invention',eraKey:'industrial',dateNum:1800,date:'1800',title:'Voltaic Pile (First Battery)',
    avatar:{type:'emoji',emoji:'🔋'},
    body:'By stacking alternating copper and zinc discs separated by brine-soaked cloth, Volta creates the first device capable of producing continuous electrical current. Davy uses it to discover new elements. Faraday uses it to discover electromagnetic induction. Every subsequent leap in electricity begins here.'},
  'faraday':{col:'left',type:'person',eraKey:'industrial',dateNum:1791,date:'b. 1791',title:'Michael Faraday',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Faraday%2C_Michael_sci_miMS_frontis.jpg/120px-Faraday%2C_Michael_sci_miMS_frontis.jpg',initials:'MF'},
    body:'Son of a blacksmith with no formal education. Taught himself chemistry by reading every book he could borrow, then talked his way into a job as Davy\'s lab assistant. His 1831 discovery that moving a magnet inside a coil generates current — electromagnetic induction — makes electricity useful. He showed that electricity and magnetism are one and the same thing.'},
  'maxwell':{col:'right',type:'person',eraKey:'industrial',dateNum:1831,date:'b. 1831',title:'James Clerk Maxwell',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/James_Clerk_Maxwell.png/120px-James_Clerk_Maxwell.png',initials:'JM'},
    body:'Scottish physicist who took Faraday\'s intuitive discoveries and expressed them as four elegant equations. Those equations predicted the existence of electromagnetic waves — ripples in the electromagnetic field, travelling at the speed of light. He died at 48, before anyone proved him right. Heinrich Hertz proved him right.'},
  'electromagnetism':{col:'center',type:'invention',eraKey:'industrial',dateNum:1831,date:'1831',title:'Electromagnetic Induction',
    avatar:{type:'emoji',emoji:'⚡'},
    body:'Faraday\'s induction coil (1831) demonstrates that electricity and magnetism are two expressions of one force. Maxwell\'s equations (1865) codify this and predict electromagnetic waves travelling at the speed of light. Every radio, television, wireless signal and motor begins here.'},
  'morse':{col:'right',type:'person',eraKey:'industrial',dateNum:1791,date:'b. 1791',title:'Samuel Morse',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Samuel_Morse_1840.jpg/120px-Samuel_Morse_1840.jpg',initials:'SM'},
    body:'Failed portrait painter who heard about electromagnetic discoveries on a ship from Europe and sketched a telegraph system during the voyage. With crucial help from Joseph Henry on the electromagnet, within twelve years he had a working line from Washington to Baltimore. His collaborators, who did much of the technical work, are largely forgotten.'},
  'telegraph':{col:'center',type:'invention',eraKey:'industrial',dateNum:1844,date:'1844',title:'Electric Telegraph',
    avatar:{type:'emoji',emoji:'📡'},
    body:'"What hath God wrought." Within two decades, 50,000 miles of wire criss-cross America. The telegraph reduces cross-country message time from weeks to minutes — the first time in human history that information travels faster than a human body.'},
  'heaviside':{col:'right',type:'person',eraKey:'industrial',dateNum:1850,date:'b. 1850',title:'Oliver Heaviside',
    avatar:{type:'initials',initials:'OH'},
    body:'Self-taught British engineer — largely deaf, often penniless — who transformed telecommunications mathematics. His loading coil, inserted at intervals along telephone cables, reduced signal distortion and doubled the range of calls. AT&T estimated this saved them over $100 million. The ionosphere layer that bounces radio waves around the Earth is named after him: the Heaviside Layer.'},
  'bell':{col:'left',type:'person',eraKey:'industrial',dateNum:1847,date:'b. 1847',title:'Alexander Graham Bell',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Alexander_Graham_Bell_1908.jpg/120px-Alexander_Graham_Bell_1908.jpg',initials:'AB'},
    body:'Scottish-American inventor and teacher of the deaf whose telephone patent (March 10, 1876) was filed just hours before rival Elisha Gray\'s. The resulting 600+ lawsuits were the most complex in US history to that point. Bell won the Volta Prize — 50,000 francs — and used it to fund further research.'},
  'telephone':{col:'center',type:'invention',eraKey:'industrial',dateNum:1876,date:'1876',title:'Telephone',
    avatar:{type:'emoji',emoji:'📞'},
    body:'"Mr Watson, come here — I want to see you." Within a decade, 150,000 US subscribers. Unlike the telegraph, the telephone puts communication directly in everyone\'s hands. Theodore Vail\'s AT&T spent decades solving "the problem of distance," using Heaviside\'s loading coils to make transcontinental calls possible by 1915.'},
  'hertz':{col:'right',type:'person',eraKey:'industrial',dateNum:1857,date:'b. 1857',title:'Heinrich Hertz',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Heinrich_Rudolf_Hertz.jpg/120px-Heinrich_Rudolf_Hertz.jpg',initials:'HH'},
    body:'German physicist who proved Maxwell\'s prediction correct: electromagnetic waves exist and travel at the speed of light. In 1887 he generated and detected radio waves in his lab. "I don\'t see any practical application," he reportedly said. He died at 36. The unit of frequency bears his name. Marconi was paying attention.'},
  'radio-waves':{col:'center',type:'invention',eraKey:'industrial',dateNum:1887,date:'1887',title:'Radio Waves Demonstrated',
    avatar:{type:'emoji',emoji:'〰️'},
    body:'Hertz\'s 1887 experiments are pure science — proving Maxwell\'s equations, nothing more. But across Europe, inventors immediately grasp what Hertz missed: electromagnetic waves can carry information through the air without wires. The race for wireless telegraphy begins.'},
  'hollerith':{col:'left',type:'person',eraKey:'industrial',dateNum:1860,date:'b. 1860',title:'Herman Hollerith',
    avatar:{type:'initials',initials:'HH'},
    body:'American inventor who mechanised the US census using punch cards — holes in specific positions completing electrical circuits to tabulate data. His 1890 system reduced seven years of hand-counting to six weeks. He founded the Tabulating Machine Company, which became CTR, which Thomas Watson renamed IBM. Every database and spreadsheet descends in spirit from Hollerith\'s punched card.'},
  'marconi':{col:'left',type:'person',eraKey:'industrial',dateNum:1874,date:'b. 1874',title:'Guglielmo Marconi',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Guglielmo_Marconi.jpg/120px-Guglielmo_Marconi.jpg',initials:'GM'},
    body:'Twenty-year-old Italian nobleman who read about Hertz\'s experiments and immediately grasped their commercial potential. No university would fund him; his wealthy mother financed his early work. In 1901 he transmitted wirelessly from Cornwall to Newfoundland — 3,500 km through the air. The Titanic disaster made wireless telegraphy mandatory on ships.'},
  'watson-ibm':{col:'right',type:'person',eraKey:'industrial',dateNum:1874,date:'b. 1874',title:'Thomas J. Watson Sr.',
    avatar:{type:'initials',initials:'TW'},
    body:'Salesman trained by the ruthless NCR founder Joseph Patterson. He took over the Computing Tabulating Recording Company in 1914 and renamed it IBM in 1924. His philosophy: THINK signs, company songs, absolute loyalty. IBM\'s German subsidiary Dehomag provided punch card technology that enabled the Nazi racial census — the identification of Jewish citizens for persecution. Watson returned his Nazi medal in 1940.'},
  'wireless-telegraph':{col:'center',type:'invention',eraKey:'industrial',dateNum:1901,date:'1901',title:'Wireless Telegraphy',
    avatar:{type:'emoji',emoji:'📻'},
    body:'Marconi\'s 1901 transatlantic transmission proves radio waves follow Earth\'s curvature via the ionosphere (the Heaviside Layer). Wireless makes every ship at sea reachable. Lloyd\'s of London insists ships carry wireless equipment — which proves critical in April 1912.'},
  'de-forest':{col:'right',type:'person',eraKey:'industrial',dateNum:1873,date:'b. 1873',title:'Lee de Forest',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Lee_de_Forest.jpg/120px-Lee_de_Forest.jpg',initials:'LF'},
    body:'American inventor who added a third electrode — the grid — to the vacuum tube to create the triode Audion (1906). The triode amplified signals, making long-distance telephone calls and broadcast radio possible. AT&T\'s Bell Labs engineers refined his crude design into a reliable amplifier. De Forest was convicted of mail fraud promoting it. His invention outlasted his reputation.'},
  'vacuum-tube':{col:'center',type:'invention',eraKey:'industrial',dateNum:1906,date:'1904 – 1906',title:'Vacuum Tube',
    avatar:{type:'emoji',emoji:'💡'},
    body:'Fleming\'s diode (1904) detects radio waves; de Forest\'s triode (1906) amplifies them. By the 1920s, vacuum tubes power radios, then telephone exchanges, then the first computers. ENIAC used 17,468 of them. They ran hot, burnt out constantly, consumed enormous power. The transistor made them obsolete — but not before they cracked the Lorenz cipher at Bletchley Park.'},
  'titanic-radio':{col:'right',type:'event',eraKey:'industrial',dateNum:1912,date:'1912',title:'Titanic & the Radio Act',
    avatar:{type:'emoji',emoji:'🚢'},ghost:true,
    body:'April 14, 1912: the Titanic\'s operators receive six ice warnings but are busy relaying passengers\' personal messages. The nearby Californian\'s operator has gone to bed. 1,517 die. The Radio Act of 1912 mandates 24-hour wireless watches and standardises distress frequencies — tragedy as the mechanism of regulation.'},
  'tesla':{col:'left',type:'person',eraKey:'industrial',dateNum:1856,date:'b. 1856',title:'Nikola Tesla',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/N.Tesla.JPG/120px-N.Tesla.JPG',initials:'NT'},
    body:'Serbian-born visionary who grasped the advantages of alternating current. Worked briefly for Edison before splitting to partner with Westinghouse. His polyphase AC motor won the War of Currents. He spent his millions chasing wireless power transmission at Wardenclyffe Tower and died alone and penniless in a New York hotel room.'},
  'tesla-ac':{col:'right',type:'invention',eraKey:'industrial',dateNum:1893,date:'1893',title:'Tesla & Westinghouse AC',
    avatar:{type:'emoji',emoji:'⚡'},
    body:'Tesla, working with Westinghouse, demonstrates AC can travel hundreds of miles via transformers. Their triumph at the 1893 Chicago World\'s Fair — 200,000 bulbs lit — and the Niagara Falls plant (1895) settles the War of Currents. AC becomes the global standard. General Electric quietly switches to AC.'},
  'edison':{col:'left',type:'person',eraKey:'industrial',dateNum:1847,date:'b. 1847',title:'Thomas Edison',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Thomas_Edison2.jpg/120px-Thomas_Edison2.jpg',initials:'TE'},
    body:'Prolific inventor and ruthless businessman who built the first commercial electrical grid. Fought the War of Currents with every trick available — publicly electrocuting animals to discredit AC, funding the electric chair to associate Tesla\'s current with death. Topsy the elephant was electrocuted in 1903 and filmed. His DC attachment ultimately lost to physics.'},
  'edison-dc':{col:'right',type:'invention',eraKey:'industrial',dateNum:1882,date:'1882',title:'Edison\'s DC Power Grid',
    avatar:{type:'emoji',emoji:'⚙️'},ghost:true,
    body:'Edison\'s Pearl Street Station (1882) lights 59 Manhattan customers with direct current. But DC degrades over distance — no transformer can boost it. No amount of propaganda could change the physics. The War of Currents ends badly for Edison, though he lives long enough to admit Tesla was right.'},

  // COMPUTING — EP6
  'shockley':{col:'left',type:'person',eraKey:'computing',dateNum:1910,date:'b. 1910',title:'William Shockley',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/William_Shockley.jpg/120px-William_Shockley.jpg',initials:'WS'},
    body:'Bell Labs physicist who led the team that invented the transistor (1947) and won the Nobel Prize in 1956. He moved to Palo Alto and founded Shockley Semiconductor. His brilliance as a scientist was matched by his dysfunction as a manager. His best engineers — the "traitorous eight" — quit and founded Fairchild, then Intel. Shockley later embraced eugenics. He inadvertently created Silicon Valley.'},
  'turing':{col:'left',type:'person',eraKey:'computing',dateNum:1912,date:'b. 1912',title:'Alan Turing',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Alan_Turing_Aged_16.jpg/120px-Alan_Turing_Aged_16.jpg',initials:'AT'},
    body:'Cambridge mathematician whose 1936 paper "On Computable Numbers" describes a theoretical universal machine — the blueprint for every computer built since. At Bletchley Park his Bombe cracked Enigma; Tommy Flowers\'s Colossus cracked the Lorenz cipher. Turing visited Bell Labs and discussed chess-playing machines with Shannon. Prosecuted for homosexuality in 1952. Pardoned posthumously in 2013.'},
  'shannon':{col:'right',type:'person',eraKey:'computing',dateNum:1916,date:'b. 1916',title:'Claude Shannon',
    avatar:{type:'portrait',src:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Claude_Elwood_Shannon_%281916-2001%29.jpg/120px-Claude_Elwood_Shannon_%281916-2001%29.jpg',initials:'CS'},
    body:'Bell Labs mathematician who published "A Mathematical Theory of Communication" in 1948 — possibly the most consequential paper of the 20th century. Shannon proved that information can be quantified in bits and set the theoretical limits of all communication. Fry: one of "the two greatest heroes of the information age." He rode a unicycle down Bell Labs corridors juggling.'},
  'turing-machine':{col:'center',type:'concept',eraKey:'computing',dateNum:1936,date:'1936',title:'The Turing Machine',
    avatar:{type:'emoji',emoji:'📐'},
    body:'Turing\'s 1936 thought experiment: a machine reading symbols on an infinite tape and following rules can compute anything computable. The paper solved a mathematical problem, not designed hardware — but it defined what computation means. George Boole\'s binary algebra turned out to be its exact mathematical language. Every CPU is a physical Turing machine.'},
  'colossus':{col:'right',type:'invention',eraKey:'computing',dateNum:1943,date:'1943',title:'Colossus',
    avatar:{type:'emoji',emoji:'🔲'},
    body:'Built at Bletchley Park by Tommy Flowers — a Post Office telephone engineer — Colossus was the world\'s first large-scale programmable electronic computer. It used 1,500 vacuum tubes to crack Hitler\'s Lorenz cipher. Kept classified until 1975, its existence was expunged from computing history. ENIAC got the credit. Flowers got almost nothing.'},
  'transistor':{col:'center',type:'invention',eraKey:'computing',dateNum:1947,date:'1947',title:'Transistor Invented',
    avatar:{type:'emoji',emoji:'⚙️'},
    body:'Bell Labs: Bardeen, Brattain and Shockley create a solid-state device consuming one-millionth the power of a vacuum tube, with no warm-up time and theoretically limitless miniaturisation. The vote for the device\'s name ruled out "Iotatron" — the title of Fry\'s final episode. Nobel Prize, 1956. Silicon Valley begins here.'},
  'information-theory':{col:'center',type:'concept',eraKey:'computing',dateNum:1948,date:'1948',title:'Information Theory',
    avatar:{type:'emoji',emoji:'📊'},
    body:'Shannon\'s 1948 paper establishes that all information — text, sound, image — can be expressed as binary digits and transmitted with mathematical precision. His channel capacity theorem defines the theoretical maximum data rate of any communication channel. Shannon also recognised that Boole\'s binary algebra was the perfect tool for circuit design — connecting Victorian mathematics to the digital age.'},
  'integrated-circuit':{col:'center',type:'invention',eraKey:'computing',dateNum:1958,date:'1958',title:'Integrated Circuit',
    avatar:{type:'emoji',emoji:'🔳'},
    body:'Kilby at Texas Instruments (1958) and Noyce at Fairchild (1959) independently place multiple transistors on a single chip — solving the "tyranny of numbers," the impossibility of reliably wiring thousands of discrete components. The traitorous eight who left Shockley founded Fairchild, then Intel. Gordon Moore joins them. Everything that follows flows from this.'},
  'moores-law':{col:'center',type:'concept',eraKey:'computing',dateNum:1965,date:'1965',title:'Moore\'s Law',
    avatar:{type:'emoji',emoji:'📈'},
    body:'Intel co-founder Gordon Moore observed in 1965 that transistor count per chip had doubled every year since 1959. He predicted this would continue. It did — for fifty years. Fry uses the chessboard-and-rice parable to explain exponential growth: by square 64, you need more rice than has ever been grown. Moore\'s Law is less a natural law than a self-fulfilling prophecy.'},
  'deep-blue':{col:'right',type:'event',eraKey:'computing',dateNum:1997,date:'1997',title:'Deep Blue Beats Kasparov',
    avatar:{type:'emoji',emoji:'♟️'},ghost:true,
    body:'IBM\'s Deep Blue defeats world chess champion Garry Kasparov in 1997. Kasparov senses creativity in some moves and accuses IBM of cheating; later analysis suggests it was a bug that unnerved him. Deep Blue calculated 200 million positions per second: brute force, not intelligence. Fry: "It was cheating, really." IBM\'s data lineage runs from Hollerith\'s punch cards to this match.'},
  'alphago':{col:'center',type:'event',eraKey:'computing',dateNum:2016,date:'2016',title:'AlphaGo & the New Intelligence',
    avatar:{type:'emoji',emoji:'🧠'},
    body:'DeepMind\'s AlphaGo defeats world Go champion Lee Sedol 4-1 in March 2016 — way earlier than Demis Hassabis\'s team predicted. Unlike Deep Blue, AlphaGo cannot brute-force Go\'s 10¹⁷⁰ possible positions. It uses deep reinforcement learning, training against itself millions of times. Move 37 of Game 2: "not a human move." In May 2017, world champion Ke Jie fell. Something had changed.'},
};

const CONNECTIONS=[
  {from:'first-tools',        to:'cognitive-revolution',    type:'trunk'},
  {from:'cognitive-revolution',to:'agricultural-revolution',type:'trunk'},
  // ∨ chevron after prehistory
  {from:'gutenberg',          to:'gutenberg-press',         type:'person'},
  {from:'gutenberg-press',    to:'protestant-reformation',  type:'trunk'},
  {from:'martin-luther',      to:'protestant-reformation',  type:'person'},
  // ∨ chevron after medieval
  {from:'volta',              to:'volta-battery',           type:'person'},
  {from:'volta-battery',      to:'electromagnetism',        type:'trunk'},
  {from:'faraday',            to:'electromagnetism',        type:'person'},
  {from:'electromagnetism',   to:'telegraph',               type:'trunk'},
  {from:'morse',              to:'telegraph',               type:'person'},
  {from:'telegraph',          to:'telephone',               type:'trunk'},
  {from:'bell',               to:'telephone',               type:'person'},
  {from:'heaviside',          to:'telephone',               type:'person'},
  {from:'telephone',          to:'wireless-telegraph',      type:'trunk'},
  {from:'hertz',              to:'radio-waves',             type:'person'},
  {from:'maxwell',            to:'radio-waves',             type:'person'},
  {from:'radio-waves',        to:'wireless-telegraph',      type:'trunk'},
  {from:'marconi',            to:'wireless-telegraph',      type:'person'},
  {from:'wireless-telegraph', to:'vacuum-tube',             type:'trunk',fork:'titanic-radio'},
  {from:'wireless-telegraph', to:'titanic-radio',           type:'ghost'},
  {from:'de-forest',          to:'vacuum-tube',             type:'person'},
  {from:'volta-battery',      to:'tesla-ac',                type:'trunk',fork:'edison-dc'},
  {from:'volta-battery',      to:'edison-dc',               type:'ghost'},
  {from:'tesla',              to:'tesla-ac',                type:'person'},
  {from:'edison',             to:'edison-dc',               type:'person'},
  {from:'vacuum-tube',        to:'colossus',                type:'trunk'},
  {from:'boole',              to:'turing-machine',          type:'person'},
  {from:'turing',             to:'turing-machine',          type:'person'},
  {from:'turing',             to:'colossus',                type:'person'},
  {from:'turing-machine',     to:'colossus',                type:'trunk'},
  {from:'shockley',           to:'transistor',              type:'person'},

  {from:'shannon',            to:'information-theory',      type:'person'},

  {from:'integrated-circuit', to:'moores-law',              type:'trunk'},

];

const PARENTS={};
CONNECTIONS.forEach(c=>{
  if(!PARENTS[c.to])PARENTS[c.to]=[];
  PARENTS[c.to].push(c.from);
  if(c.fork){if(!PARENTS[c.fork])PARENTS[c.fork]=[];PARENTS[c.fork].push(c.from);}
});
function getAncestors(id){
  const visited=new Set(),q=[id];
  while(q.length){const cur=q.shift();if(visited.has(cur))continue;visited.add(cur);(PARENTS[cur]||[]).forEach(p=>q.push(p));}
  return visited;
}

let nodePos={},mapBaseHeight=0;
function layoutByDate(){
  const SECTION_GAP=120,TOP_PAD=60,rawY={};
  ERA_DEFS.forEach(era=>{
    const span=era.endYear-era.startYear;
    Object.entries(NODES).forEach(([id,n])=>{
      if(n.eraKey!==era.key)return;
      rawY[id]=Math.min(1,Math.max(0,(n.dateNum-era.startYear)/span))*era.budget;
    });
  });
  ERA_DEFS.forEach(era=>{
    ['left','center','right'].forEach(col=>{
      const ns=Object.keys(NODES).filter(id=>NODES[id].eraKey===era.key&&NODES[id].col===col).sort((a,b)=>rawY[a]-rawY[b]);
      for(let i=1;i<ns.length;i++){if(rawY[ns[i]]-rawY[ns[i-1]]<MIN_GAP)rawY[ns[i]]=rawY[ns[i-1]]+MIN_GAP;}
    });
    const ids=Object.keys(NODES).filter(id=>NODES[id].eraKey===era.key);
    if(ids.length)era.budget=Math.max(era.budget,Math.max(...ids.map(id=>rawY[id]))+80);
  });
  let cursor=TOP_PAD;
  ERA_DEFS.forEach(era=>{
    cursor+=SECTION_PAD;era._labelY=cursor;cursor+=ERA_HEAD;era._nodeTopY=cursor;cursor+=era.budget;era._endY=cursor;cursor+=SECTION_GAP;
  });
  mapBaseHeight=cursor+80;
  Object.entries(NODES).forEach(([id,n])=>{
    const era=ERA_DEFS.find(e=>e.key===n.eraKey);
    if(!era)return;
    nodePos[id]={x:COL[n.col],y:era._nodeTopY+rawY[id],h:COLLAPSED_H};
  });
}

const openNodes=new Set();
function repositionNodes(){
  const allItems=[];
  Object.keys(nodePos).forEach(id=>allItems.push({type:'node',id,baseY:nodePos[id].y}));
  ERA_DEFS.forEach(era=>allItems.push({type:'era',key:era.key,baseY:era._labelY}));
  allItems.sort((a,b)=>a.baseY-b.baseY);
  let cumExtra=0,groupExtra=0,lastBaseY=-Infinity;
  allItems.forEach(item=>{
    const baseY=item.baseY;
    if(baseY>lastBaseY+1){cumExtra+=groupExtra;groupExtra=0;lastBaseY=baseY;}
    const effectiveY=baseY+cumExtra;
    if(item.type==='node'){
      const el=document.querySelector(`.node[data-id="${item.id}"]`);
      if(el)el.style.top=effectiveY+'px';
      if(openNodes.has(item.id)&&el){const extra=Math.max(0,el.offsetHeight-nodePos[item.id].h);if(extra>groupExtra)groupExtra=extra;}
    }else{
      const el=document.querySelector(`.era-label[data-era="${item.key}"]`);
      if(el)el.style.top=effectiveY+'px';
    }
  });
  let maxBot=mapBaseHeight+cumExtra+groupExtra;
  Object.keys(nodePos).forEach(id=>{
    const el=document.querySelector(`.node[data-id="${id}"]`);
    if(el)maxBot=Math.max(maxBot,parseFloat(el.style.top)+el.offsetHeight+80);
  });
  document.getElementById('map').style.height=maxBot+'px';
}

function avatarHTML(n){
  const a=n.avatar;if(!a)return'';
  if(a.type==='portrait')return`<img src="${a.src}" alt="" loading="lazy" onload="this.nextElementSibling.style.display='none'" onerror="this.style.display='none';this.nextElementSibling.style.display=''"><span class="av-fallback">${a.initials}</span>`;
  if(a.type==='emoji')return`<span style="font-size:17px;line-height:1">${a.emoji}</span>`;
  if(a.type==='initials')return`<span class="av-fallback">${a.initials}</span>`;
  return'';
}

function buildDOM(){
  const map=document.getElementById('map');
  map.querySelectorAll('.node,.era-label').forEach(el=>el.remove());
  ERA_DEFS.forEach(era=>{
    const el=document.createElement('div');el.className='era-label';el.dataset.era=era.key;
    el.style.top=era._labelY+'px';el.innerHTML=`<h2>${era.name}</h2><span>${era.span}</span>`;map.appendChild(el);
  });
  Object.entries(nodePos).forEach(([id,pos])=>{
    const n=NODES[id];if(!n)return;
    const el=document.createElement('div');
    el.className='node'+(n.ghost?' is-ghost':'');el.dataset.id=id;
    el.style.left=pos.x+'px';el.style.top=pos.y+'px';
    el.innerHTML=`<div class="node-head"><div class="node-avatar">${avatarHTML(n)}</div><div class="node-head-text"><div class="node-type">${n.type}</div><div class="node-title">${n.title}</div><div class="node-date">${n.date}</div></div><span class="node-chevron">▾</span></div><div class="node-detail"><div class="node-detail-inner">${n.body}</div></div>`;
    el.addEventListener('click',e=>{e.stopPropagation();handleNodeClick(id,el);});
    map.appendChild(el);
  });
  map.style.height=mapBaseHeight+'px';
}
function syncHeights(){document.querySelectorAll('.node').forEach(el=>{const id=el.dataset.id;if(nodePos[id])nodePos[id].h=el.offsetHeight;});}

function getNodeCenter(id){
  const el=document.querySelector(`.node[data-id="${id}"]`);if(!el)return null;
  const mr=document.getElementById('map').getBoundingClientRect(),nr=el.getBoundingClientRect();
  return{x:nr.left-mr.left+nr.width/2,top:nr.top-mr.top,bot:nr.bottom-mr.top,w:nr.width,h:nr.height};
}
function drawPath(svg,d,cls){const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('class',cls);p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');svg.appendChild(p);}
function bezierV(x1,y1,x2,y2){const my=(y1+y2)/2;return`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;}
function bezierH(x1,y1,x2,y2){const mx=(x1+x2)/2;return`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;}
function drawChevron(svg,cx,topY){
  const hw=30,h=11;
  [[cx-hw,topY,cx,topY+h],[cx+hw,topY,cx,topY+h]].forEach(([x1,y1,x2,y2])=>{
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke','#C8C4BE');l.setAttribute('stroke-width','1.5');l.setAttribute('stroke-linecap','round');svg.appendChild(l);
  });
}
function drawLines(activeAnc){
  const svg=document.getElementById('lines'),map=document.getElementById('map');
  svg.innerHTML='';svg.style.height=map.scrollHeight+'px';
  const style=document.createElementNS('http://www.w3.org/2000/svg','style');
  style.textContent=`path.trunk{stroke:#D6D3D1;stroke-width:1.5}path.ghost{stroke:#E0DDD9;stroke-width:1.5;stroke-dasharray:5 4}path.person{stroke:#D1CBC3;stroke-width:1.5}path.active{stroke:#B45309;stroke-width:2}path.active-ghost{stroke:#D4956B;stroke-width:1.5;stroke-dasharray:5 4}path.active-person{stroke:#B45309;stroke-width:1.5}`;
  svg.appendChild(style);
  const forkDone=new Set();
  CONNECTIONS.forEach(conn=>{
    const fromC=getNodeCenter(conn.from),toC=getNodeCenter(conn.to);if(!fromC||!toC)return;
    const bothActive=!activeAnc||(activeAnc.has(conn.from)&&activeAnc.has(conn.to));
    if(conn.type==='trunk'){
      if(conn.fork){
        const forkC=getNodeCenter(conn.fork);if(!forkC)return;
        const stemX=fromC.x,stemY1=fromC.bot,forkY=stemY1+(Math.min(toC.top,forkC.top)-stemY1)*0.45;
        if(!forkDone.has(conn.from+conn.fork)){
          forkDone.add(conn.from+conn.fork);
          const stem=document.createElementNS('http://www.w3.org/2000/svg','line');
          stem.setAttribute('x1',stemX);stem.setAttribute('y1',stemY1);stem.setAttribute('x2',stemX);stem.setAttribute('y2',forkY);
          stem.setAttribute('stroke',bothActive?'#B45309':'#D6D3D1');stem.setAttribute('stroke-width',bothActive?'2':'1.5');svg.appendChild(stem);
        }
        drawPath(svg,bezierV(stemX,forkY,toC.x,toC.top),(!activeAnc||(activeAnc.has(conn.from)&&activeAnc.has(conn.to)))?'active':'trunk');
        drawPath(svg,bezierV(stemX,forkY,forkC.x,forkC.top),(!activeAnc||(activeAnc.has(conn.from)&&activeAnc.has(conn.fork)))?'active-ghost':'ghost');
      }else{
        drawPath(svg,bezierV(fromC.x,fromC.bot,toC.x,toC.top),bothActive?'active':'trunk');
      }
    }else if(conn.type==='person'){
      const goRight=fromC.x<toC.x;
      const fx=goRight?fromC.x+fromC.w/2:fromC.x-fromC.w/2;
      const tx=goRight?toC.x-toC.w/2:toC.x+toC.w/2;
      const active=!activeAnc||(activeAnc.has(conn.from)&&activeAnc.has(conn.to));
      drawPath(svg,bezierH(fx,fromC.top+fromC.h/2,tx,toC.top+toC.h/2),active?'active-person':'person');
    }
  });
  CHEVRON_AFTER_ERAS.forEach(eraKey=>{
    let maxBot=0;
    Object.keys(NODES).filter(id=>NODES[id].eraKey===eraKey).forEach(id=>{const c=getNodeCenter(id);if(c&&c.bot>maxBot)maxBot=c.bot;});
    if(maxBot>0)drawChevron(svg,COL.center,maxBot+28);
  });
}

let selectedId=null;
function handleNodeClick(id,el){
  if(openNodes.has(id))openNodes.delete(id);else openNodes.add(id);
  el.classList.toggle('open');
  setTimeout(()=>{repositionNodes();drawLines(selectedId?getAncestors(selectedId):null);},340);
  if(selectedId===id){clearSel();return;}
  selectedId=id;
  const anc=getAncestors(id);
  document.querySelectorAll('.node').forEach(n=>{
    const nid=n.dataset.id;n.classList.remove('is-selected','is-active','is-dimmed');
    if(nid===id)n.classList.add('is-selected');
    else if(anc.has(nid))n.classList.add('is-active');
    else n.classList.add('is-dimmed');
  });
  document.getElementById('toast').classList.add('show');
  drawLines(anc);
}
function clearSel(){
  selectedId=null;openNodes.clear();
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('is-selected','is-active','is-dimmed','open'));
  document.getElementById('toast').classList.remove('show');
  setTimeout(()=>{repositionNodes();drawLines(null);},340);
}
document.addEventListener('click',e=>{if(!e.target.closest('.node')&&!e.target.closest('#toast'))clearSel();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')clearSel();});
document.getElementById('toast').addEventListener('click',clearSel);

layoutByDate();buildDOM();
requestAnimationFrame(()=>{syncHeights();repositionNodes();drawLines(null);});
window.addEventListener('resize',()=>drawLines(selectedId?getAncestors(selectedId):null));
</script>
