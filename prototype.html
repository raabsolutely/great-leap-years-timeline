<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Leap Years — Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:            #FAFAF9;
  --surface:       #FFFFFF;
  --border-normal: #E7E5E4;
  --border-ghost:  #D6D3D1;
  --amber:         #B45309;
  --text:          #1C1917;
  --muted:         #78716C;
  --light:         #A8A29E;
  --radius:        10px;
  --node-w:        260px;
  --map-w:         960px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  overflow-x: auto;
}

.page-header {
  padding: 56px 40px 32px;
  max-width: calc(var(--map-w) + 80px);
  margin: 0 auto;
  border-bottom: 1px solid var(--border-normal);
}
.page-header h1 { font-size: 24px; font-weight: 600; }
.page-header p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

#scroll-wrap { overflow-x: auto; padding: 0 40px 120px; }
#map { position: relative; width: var(--map-w); margin: 0 auto; }

#lines {
  position: absolute; top: 0; left: 0;
  width: 100%; pointer-events: none; overflow: visible;
}

.era-label {
  position: absolute; left: 0; right: 0;
  display: flex; align-items: baseline; gap: 12px;
  transition: top 0.32s ease;
}
.era-label h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: var(--amber); }
.era-label span { font-size: 12px; color: var(--light); }

.node {
  position: absolute;
  width: var(--node-w);
  background: var(--surface);
  border: 1.5px solid var(--border-normal);
  border-radius: var(--radius);
  cursor: pointer;
  transform: translateX(-50%);
  transition: border-color 0.2s, opacity 0.25s, filter 0.25s, box-shadow 0.2s, background 0.2s;
  overflow: hidden;
}
.node:hover { border-color: var(--muted); }

.node-head {
  padding: 12px 14px;
  user-select: none;
  position: relative;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.node-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  background: #F0EBE3;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.node-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.av-fallback { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; }

.node-head-text { flex: 1; min-width: 0; padding-right: 20px; }
.node-type {
  font-size: 9.5px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--light); margin-bottom: 3px;
}
.node-title { font-size: 15px; font-weight: 500; line-height: 1.3; color: var(--text); }
.node-date  { font-size: 11px; color: var(--muted); margin-top: 4px; }

.node-chevron {
  position: absolute;
  top: 13px; right: 13px;
  font-size: 16px;
  color: var(--light);
  transition: transform 0.22s;
  line-height: 1;
}
.node.open .node-chevron { transform: rotate(180deg); }

.node-detail { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
.node.open .node-detail { max-height: 600px; }
.node-detail-inner {
  border-top: 1px solid #F0EDEA;
  padding: 12px 14px 14px;
  font-size: 12.5px; color: var(--muted); line-height: 1.75;
}

.node.is-ghost      { border-color: var(--border-ghost); background: #FAFAF9; }
.node.is-ancestor   { border-color: var(--amber) !important; background: #FFFBEB; }
.node.is-descendant { border-color: #64748B !important; background: #F8FAFC; }
.node.is-selected   { border-color: var(--amber) !important; box-shadow: 0 0 0 2px rgba(180,83,9,0.18); }
.node.is-dimmed     { opacity: 0.38; filter: grayscale(40%); }
.node.is-dimmed:hover { opacity: 0.62; border-color: var(--muted); cursor: pointer; }

#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #1C1917; color: #FFF; font-size: 12px;
  padding: 8px 18px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s; z-index: 999; cursor: pointer;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
</style>
</head>
<body>

<div class="page-header">
  <h1>Great Leap Years — Timeline</h1>
  <p>Stephen Fry's history of technology. Click a node to trace its ancestry. Click again or Esc to reset.</p>
</div>

<div id="scroll-wrap">
  <div id="map">
    <svg id="lines"></svg>
  </div>
</div>

<div id="toast">Tap here to collapse all</div>

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
const NODES = {

  // ── PREHISTORY ──────────────────────────────

    avatar:{ type:'emoji', emoji:'🪨' },

  },
  'cai-lun': {

// ═══════════════════════════════════════════════
//  CONNECTIONS
// ═══════════════════════════════════════════════
const CONNECTIONS = [
  // Prehistory chain
  { from:'first-tools',             to:'cognitive-revolution',    type:'trunk' },
  { from:'cognitive-revolution',    to:'agricultural-revolution', type:'trunk' },
  // Prehistoric → Ancient
  { from:'agricultural-revolution', to:'cuneiform-writing',       type:'trunk' },
  // Ancient chain
  { from:'cuneiform-writing',       to:'phoenician-alphabet',     type:'trunk' },
  { from:'cai-lun',                 to:'paper',                   type:'person' },
  { from:'phoenician-alphabet',     to:'paper',                   type:'trunk' },
  // Ancient → Medieval (fork: Chinese woodblock vs Gutenberg)
  { from:'paper',                   to:'gutenberg-press',         type:'trunk', fork:'woodblock-printing' },
  { from:'paper',                   to:'woodblock-printing',      type:'ghost' },
  // Medieval
  { from:'gutenberg',               to:'gutenberg-press',         type:'person' },
  { from:'gutenberg-press',         to:'protestant-reformation',  type:'trunk' },
  { from:'martin-luther',           to:'protestant-reformation',  type:'person' },
  // ∨ chevron after medieval (no direct causal link to Industrial)
  // Industrial — main info-tech trunk
  { from:'newton',                  to:'scientific-revolution',   type:'person' },
  { from:'scientific-revolution',   to:'volta-battery',           type:'trunk' },
  { from:'volta',                   to:'volta-battery',           type:'person' },
  { from:'volta-battery',           to:'electromagnetism',        type:'trunk' },
  { from:'faraday',                 to:'electromagnetism',        type:'person' },

  { from:'telegraph',               to:'telephone',               type:'trunk' },

  { from:'radio-waves',             to:'wireless-telegraph',      type:'trunk' },

// ═══════════════════════════════════════════════
//  ANCESTOR MAP
// ═══════════════════════════════════════════════
const PARENTS = {};
const CHILDREN = {};
CONNECTIONS.forEach(c => {
  if (!PARENTS[c.to]) PARENTS[c.to] = [];
  PARENTS[c.to].push(c.from);
  if (!CHILDREN[c.from]) CHILDREN[c.from] = [];
  CHILDREN[c.from].push(c.to);
  if (c.fork) {
    if (!PARENTS[c.fork]) PARENTS[c.fork] = [];
    PARENTS[c.fork].push(c.from);
    if (!CHILDREN[c.from]) CHILDREN[c.from] = [];
    if (!CHILDREN[c.from].includes(c.fork)) CHILDREN[c.from].push(c.fork);
  }
});

function getAncestors(id) {
  const visited = new Set(), q = [id];
  while (q.length) {
    const cur = q.shift();
    if (visited.has(cur)) continue;
    visited.add(cur);
    (PARENTS[cur] || []).forEach(p => q.push(p));
  }
  return visited;
}

function getDescendants(id) {
  const visited = new Set(), q = [id];
  while (q.length) {
    const cur = q.shift();
    if (visited.has(cur)) continue;
    visited.add(cur);
    (CHILDREN[cur] || []).forEach(ch => q.push(ch));
  }
  return visited;
}

function getRelated(id) {
  return { anc: getAncestors(id), desc: getDescendants(id) };
}

// ═══════════════════════════════════════════════
//  LAYOUT — proportional date-based positioning
// ═══════════════════════════════════════════════
let nodePos = {};
let mapBaseHeight = 0;

const COLLAPSED_H = 88;
const MIN_GAP     = COLLAPSED_H + 40; // 128px

function layoutByDate() {
  const SECTION_GAP = 120;
  const TOP_PAD = 60;

  const rawY = {};
  ERA_DEFS.forEach(era => {
    const span = era.endYear - era.startYear;
    Object.entries(NODES).forEach(([id, n]) => {
      if (n.eraKey !== era.key) return;
      rawY[id] = Math.min(1, Math.max(0, (n.dateNum - era.startYear) / span)) * era.budget;
    });
  });

  ERA_DEFS.forEach(era => {
    ['left', 'center', 'right'].forEach(col => {
      const ns = Object.keys(NODES)
        .filter(id => NODES[id].eraKey === era.key && NODES[id].col === col)
        .sort((a, b) => rawY[a] - rawY[b]);
      for (let i = 1; i < ns.length; i++) {
        if (rawY[ns[i]] - rawY[ns[i-1]] < MIN_GAP) {
          rawY[ns[i]] = rawY[ns[i-1]] + MIN_GAP;
        }
      }
    });
    const ids = Object.keys(NODES).filter(id => NODES[id].eraKey === era.key);
    if (ids.length) era.budget = Math.max(era.budget, Math.max(...ids.map(id => rawY[id])) + 80);
  });

  let cursor = TOP_PAD;
  ERA_DEFS.forEach(era => {
    cursor += SECTION_PAD;
    era._labelY   = cursor;
    cursor       += ERA_HEAD;
    era._nodeTopY = cursor;
    cursor       += era.budget;
    era._endY     = cursor;
    cursor       += SECTION_GAP;
  });
  mapBaseHeight = cursor + 80;

  Object.entries(NODES).forEach(([id, n]) => {
    const era = ERA_DEFS.find(e => e.key === n.eraKey);
    if (!era) return;
    nodePos[id] = { x: COL[n.col], y: era._nodeTopY + rawY[id], h: COLLAPSED_H };
  });
}

// ═══════════════════════════════════════════════
//  EXPAND REFLOW
// ═══════════════════════════════════════════════
const openNodes = new Set();

function repositionNodes() {
  const allItems = [];
  Object.keys(nodePos).forEach(id =>
    allItems.push({ type:'node', id, baseY: nodePos[id].y }));
  ERA_DEFS.forEach(era =>
    allItems.push({ type:'era', key: era.key, baseY: era._labelY }));
  allItems.sort((a, b) => a.baseY - b.baseY);

  let cumExtra   = 0;
  let groupExtra = 0;
  let lastBaseY  = -Infinity;

  allItems.forEach(item => {
    const baseY = item.baseY;
    if (baseY > lastBaseY + 1) {
      cumExtra   += groupExtra;
      groupExtra  = 0;
      lastBaseY   = baseY;
    }
    const effectiveY = baseY + cumExtra;

    if (item.type === 'node') {
      const el = document.querySelector(`.node[data-id="${item.id}"]`);
      if (el) el.style.top = effectiveY + 'px';
      if (openNodes.has(item.id) && el) {
        const extra = Math.max(0, el.offsetHeight - nodePos[item.id].h);
        if (extra > groupExtra) groupExtra = extra;
      }
    } else {
      const el = document.querySelector(`.era-label[data-era="${item.key}"]`);
      if (el) el.style.top = effectiveY + 'px';
    }
  });

  let maxBot = mapBaseHeight + cumExtra + groupExtra;
  Object.keys(nodePos).forEach(id => {
    const el = document.querySelector(`.node[data-id="${id}"]`);
    if (el) maxBot = Math.max(maxBot, parseFloat(el.style.top) + el.offsetHeight + 80);
  });
  document.getElementById('map').style.height = maxBot + 'px';
}

// ═══════════════════════════════════════════════
//  AVATAR HTML
// ═══════════════════════════════════════════════
function avatarHTML(n) {
  const a = n.avatar;
  if (!a) return '';
  if (a.type === 'portrait') {
    return `<img src="${a.src}" alt="" loading="lazy"
      onload="this.nextElementSibling.style.display='none'"
      onerror="this.style.display='none';this.nextElementSibling.style.display=''">
      <span class="av-fallback">${a.initials}</span>`;
  }
  if (a.type === 'emoji')    return `<span style="font-size:17px;line-height:1">${a.emoji}</span>`;
  if (a.type === 'initials') return `<span class="av-fallback">${a.initials}</span>`;
  return '';
}

// ═══════════════════════════════════════════════
//  BUILD DOM
// ═══════════════════════════════════════════════
function buildDOM() {
  const map = document.getElementById('map');
  map.querySelectorAll('.node, .era-label').forEach(el => el.remove());

  ERA_DEFS.forEach(era => {
    const el = document.createElement('div');
    el.className = 'era-label';
    el.dataset.era = era.key;
    el.style.top = era._labelY + 'px';
    el.innerHTML = `<h2>${era.name}</h2><span>${era.span}</span>`;
    map.appendChild(el);
  });

  Object.entries(nodePos).forEach(([id, pos]) => {
    const n = NODES[id];
    if (!n) return;
    const el = document.createElement('div');
    el.className = 'node' + (n.ghost ? ' is-ghost' : '');
    el.dataset.id = id;
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    el.innerHTML = `
      <div class="node-head">
        <div class="node-avatar">${avatarHTML(n)}</div>
        <div class="node-head-text">
          <div class="node-type">${n.type}</div>
          <div class="node-title">${n.title}</div>
          <div class="node-date">${n.date}</div>
        </div>
        <span class="node-chevron">▾</span>
      </div>
      <div class="node-detail">
        <div class="node-detail-inner">${n.body}</div>
      </div>`;
    el.addEventListener('click', e => { e.stopPropagation(); handleNodeClick(id, el); });
    map.appendChild(el);
  });

  map.style.height = mapBaseHeight + 'px';
}

function syncHeights() {
  document.querySelectorAll('.node').forEach(el => {
    const id = el.dataset.id;
    if (nodePos[id]) nodePos[id].h = el.offsetHeight;
  });
}

// ═══════════════════════════════════════════════
//  SVG DRAWING
// ═══════════════════════════════════════════════
function getNodeCenter(id) {
  const el = document.querySelector(`.node[data-id="${id}"]`);
  if (!el) return null;
  const mr = document.getElementById('map').getBoundingClientRect();
  const nr = el.getBoundingClientRect();
  return { x: nr.left-mr.left+nr.width/2, top: nr.top-mr.top, bot: nr.bottom-mr.top, w: nr.width, h: nr.height };
}

function drawPath(svg, d, cls) {
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('d', d); p.setAttribute('class', cls);
  p.setAttribute('fill','none'); p.setAttribute('stroke-linecap','round');
  svg.appendChild(p);
}
function bezierV(x1,y1,x2,y2) { const my=(y1+y2)/2; return `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`; }
function bezierH(x1,y1,x2,y2) { const mx=(x1+x2)/2; return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`; }

function drawChevron(svg, cx, topY) {
  const hw=30, h=11;
  [[cx-hw,topY,cx,topY+h],[cx+hw,topY,cx,topY+h]].forEach(([x1,y1,x2,y2]) => {
    const l = document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke','#C8C4BE'); l.setAttribute('stroke-width','1.5');
    l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);
  });
}

function drawLines(rel) {
  const svg = document.getElementById('lines');
  const map = document.getElementById('map');
  svg.innerHTML = '';
  svg.style.height = map.scrollHeight + 'px';

  const style = document.createElementNS('http://www.w3.org/2000/svg','style');
  style.textContent = `
    path.trunk         { stroke:#D6D3D1; stroke-width:1.5; }
    path.ghost         { stroke:#E0DDD9; stroke-width:1.5; stroke-dasharray:5 4; }
    path.person        { stroke:#D1CBC3; stroke-width:1.5; }
    path.active        { stroke:#B45309; stroke-width:2; }
    path.active-ghost  { stroke:#D4956B; stroke-width:1.5; stroke-dasharray:5 4; }
    path.active-person { stroke:#B45309; stroke-width:1.5; }
    path.active-desc   { stroke:#64748B; stroke-width:2; }
    path.active-desc-ghost  { stroke:#94A3B8; stroke-width:1.5; stroke-dasharray:5 4; }
    path.active-desc-person { stroke:#64748B; stroke-width:1.5; }
  `;
  svg.appendChild(style);

  const forkDone = new Set();

  // Helper: classify a connection's highlight state
  function connClass(from, to, baseClass, activeClass, descClass) {
    if (!rel) return baseClass;
    const inAnc  = rel.anc.has(from)  && rel.anc.has(to);
    const inDesc = rel.desc.has(from) && rel.desc.has(to);
    if (inAnc)  return activeClass;
    if (inDesc) return descClass;
    return baseClass;
  }

  CONNECTIONS.forEach(conn => {
    const fromC = getNodeCenter(conn.from);
    const toC   = getNodeCenter(conn.to);
    if (!fromC || !toC) return;

    if (conn.type === 'trunk') {
      if (conn.fork) {
        const forkC = getNodeCenter(conn.fork);
        if (!forkC) return;
        const stemX  = fromC.x;
        const stemY1 = fromC.bot;
        const forkY  = stemY1 + (Math.min(toC.top, forkC.top) - stemY1) * 0.45;

        if (!forkDone.has(conn.from + conn.fork)) {
          forkDone.add(conn.from + conn.fork);
          // Stem color: amber if ancestor path, slate if descendant path
          const inAnc  = rel && rel.anc.has(conn.from)  && rel.anc.has(conn.to);
          const inDesc = rel && rel.desc.has(conn.from) && rel.desc.has(conn.to);
          const stemColor = inAnc ? '#B45309' : inDesc ? '#64748B' : '#D6D3D1';
          const stemW     = (inAnc || inDesc) ? '2' : '1.5';
          const stem = document.createElementNS('http://www.w3.org/2000/svg','line');
          stem.setAttribute('x1',stemX); stem.setAttribute('y1',stemY1);
          stem.setAttribute('x2',stemX); stem.setAttribute('y2',forkY);
          stem.setAttribute('stroke', stemColor);
          stem.setAttribute('stroke-width', stemW);
          svg.appendChild(stem);
        }
        drawPath(svg, bezierV(stemX,forkY,toC.x,toC.top),
          connClass(conn.from, conn.to,   'trunk', 'active', 'active-desc'));
        drawPath(svg, bezierV(stemX,forkY,forkC.x,forkC.top),
          connClass(conn.from, conn.fork, 'ghost', 'active-ghost', 'active-desc-ghost'));
      } else {
        drawPath(svg, bezierV(fromC.x,fromC.bot,toC.x,toC.top),
          connClass(conn.from, conn.to, 'trunk', 'active', 'active-desc'));
      }
    } else if (conn.type === 'person') {
      const goRight = fromC.x < toC.x;
      const fx = goRight ? fromC.x+fromC.w/2 : fromC.x-fromC.w/2;
      const tx = goRight ? toC.x-toC.w/2     : toC.x+toC.w/2;
      drawPath(svg, bezierH(fx,fromC.top+fromC.h/2,tx,toC.top+toC.h/2),
        connClass(conn.from, conn.to, 'person', 'active-person', 'active-desc-person'));
    }
  });

  // Chevrons: compute from actual bottommost node bottom in each era
  CHEVRON_AFTER_ERAS.forEach(eraKey => {
    let maxBot = 0;
    Object.keys(NODES).filter(id => NODES[id].eraKey === eraKey).forEach(id => {
      const c = getNodeCenter(id);
      if (c && c.bot > maxBot) maxBot = c.bot;
    });
    if (maxBot > 0) drawChevron(svg, COL.center, maxBot + 28);
  });
}

// ═══════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════
let selectedId = null;

function handleNodeClick(id, el) {
  // Toggle expand (independent of selection)
  if (openNodes.has(id)) openNodes.delete(id);
  else openNodes.add(id);
  el.classList.toggle('open');

  setTimeout(() => {
    repositionNodes();
    drawLines(selectedId ? getRelated(selectedId) : null);
  }, 340);

  // Toast tracks open nodes, not selection
  document.getElementById('toast').classList.toggle('show', openNodes.size > 0);

  // Clicking the selected node clears selection (nodes stay open)
  if (selectedId === id) { clearSel(); return; }
  selectedId = id;

  const rel = getRelated(id);
  document.querySelectorAll('.node').forEach(n => {
    const nid = n.dataset.id;
    n.classList.remove('is-selected','is-ancestor','is-descendant','is-dimmed');
    if (nid === id)               n.classList.add('is-selected');
    else if (rel.anc.has(nid))   n.classList.add('is-ancestor');
    else if (rel.desc.has(nid))  n.classList.add('is-descendant');
    else                          n.classList.add('is-dimmed');
  });
  drawLines(rel);
}

function clearSel() {
  selectedId = null;
  document.querySelectorAll('.node').forEach(n =>
    n.classList.remove('is-selected','is-ancestor','is-descendant','is-dimmed'));
  drawLines(null);
  // openNodes and toast are NOT touched — expanded nodes stay open
}

function collapseAll() {
  openNodes.clear();
  document.querySelectorAll('.node.open').forEach(n => n.classList.remove('open'));
  document.getElementById('toast').classList.remove('show');
  setTimeout(() => {
    repositionNodes();
    drawLines(selectedId ? getRelated(selectedId) : null);
  }, 340);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.node') && !e.target.closest('#toast')) clearSel();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') clearSel(); });
document.getElementById('toast').addEventListener('click', collapseAll);

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
layoutByDate();
buildDOM();
requestAnimationFrame(() => {
  syncHeights();
  repositionNodes();
  drawLines(null);
});
window.addEventListener('resize', () => drawLines(selectedId ? getRelated(selectedId) : null));
</script>
